<script>
const galleryIds = [
    "photolog",
    "DSLR",
    "gamescreenie",

  ];

const urlHash = window.location.hash;
let galleryId = urlHash.substring(1); 
if (galleryIds.includes(galleryId)) {
  selectGallery(galleryId);
}

function selectGallery(galleryId) {
  for (let id of galleryIds) {
    document.getElementById("button-" + id).style.color = "black";
    document.getElementById("button-" + id).style.backgroundColor = "#fff6eb";
    document.getElementById("gallery-" + id).style.display = "none";
  }
  document.getElementById("button-" + galleryId).style.color = "white";
  document.getElementById("button-" + galleryId).style.backgroundColor = "#68a5eb";
  document.getElementById("gallery-" + galleryId).style.display = "block";
}

function myFunction() {
  var x = document.getElementById("navid");
  if (x.className === "nav") {
    x.className += "responsive";
  } else {
    x.className = "nav";
  }
}


</script>
